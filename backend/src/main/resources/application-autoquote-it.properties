# 자동견적 통합테스트(dev/IT) 프로파일 — 운영 MySQL 없이 :8080 으로 부팅하기 위한 인메모리 H2.
#
# 목적: @slice-1 Playwright 인수테스트가 살아있는 백엔드의
#   GET /api/admin/autoquote/{corpus,priors}
# 를 JWT 로 호출할 수 있게, 운영 root 비밀번호 없이 백엔드를 띄운다.
# corpus/priors 엔드포인트는 classpath JSON 만 서빙하므로 DB 행이 전혀 필요 없다 → H2 빈 스키마로 충분.
#
# 운영용 Flyway 마이그레이션(V1..V9)은 MySQL 전용이라 여기선 끄고(스키마는 JPA ddl-auto 로 생성),
# 나머지 설정(jwt.secret, CORS, 데모 계정 등)은 메인 application.properties 가 그대로 제공한다.
# 이 파일은 --spring.profiles.active=autoquote-it 로 부팅할 때만 메인 설정 위에 덮어쓴다.
# 운영 기본 데이터소스/마이그레이션/엔티티는 일절 건드리지 않는 순수 추가 프로파일이다.
spring.datasource.url=jdbc:h2:mem:hdsign_autoquote_it;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# 운영 Flyway 마이그레이션은 MySQL 전용 → IT 부팅에선 비활성화.
spring.flyway.enabled=false

# 인수테스트가 기대하는 포트(프론트 corpusClient 의 기본 BASE_URL = http://localhost:8080).
server.port=8080
