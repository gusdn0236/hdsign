spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hdsign?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:change-this-jwt-secret-before-production-123456}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.client-expiration-ms=${JWT_CLIENT_EXPIRATION_MS:2592000000}

upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=300MB

r2.access-key=${R2_ACCESS_KEY:}
r2.secret-key=${R2_SECRET_KEY:}
r2.endpoint=${R2_ENDPOINT:}
r2.bucket=${R2_BUCKET:}
r2.public-url=${R2_PUBLIC_URL:}

spring.mail.host=${SMTP_HOST:smtp.naver.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

order.mail.to=${ORDER_MAIL_TO:}
magic.link.base-url=${MAGIC_LINK_BASE_URL:https://gusdn0236.github.io/hdsign}
order.mail.large-link-threshold-mb=25
order.mail.large-link-expire-days=30
