spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hdsign?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP — 동시 거래처 업로드/관리자 조회/모바일 폴링이 겹치는 시점 대비.
# 기본값(max=10) 으로는 5명 동시 업로드만 와도 스레드 풀이 묶여 홈페이지 응답이 지연된다.
# Railway MySQL 무료/스타터 플랜의 max_connections 한도(보통 ~20~50) 를 넘지 않도록 20 고정.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:change-this-jwt-secret-before-production-123456}
jwt.expiration-ms=${JWT_EXPIRATION_MS:43200000}
jwt.client-expiration-ms=${JWT_CLIENT_EXPIRATION_MS:43200000}

upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=300MB

resend.api-key=${RESEND_API_KEY:}
resend.api-base-url=${RESEND_API_BASE_URL:https://api.resend.com}
mail.from=${MAIL_FROM:HD Sign <onboarding@resend.dev>}
order.mail.to=${ORDER_MAIL_TO:hdno0236@naver.com}

r2.access-key=${R2_ACCESS_KEY:local-dummy-key}
r2.secret-key=${R2_SECRET_KEY:local-dummy-secret}
r2.endpoint=${R2_ENDPOINT:}
r2.bucket=${R2_BUCKET:local-dummy-bucket}
r2.public-url=${R2_PUBLIC_URL:}

# 작업증거 사진을 공용 구글 드라이브에 백업. 모든 키가 채워져야 활성화됨.
# refresh-token 발급은 scripts/gdrive_get_refresh_token.py 참고.
gdrive.enabled=${GDRIVE_ENABLED:false}
gdrive.client-id=${GDRIVE_CLIENT_ID:}
gdrive.client-secret=${GDRIVE_CLIENT_SECRET:}
gdrive.refresh-token=${GDRIVE_REFRESH_TOKEN:}
gdrive.root-folder-name=${GDRIVE_ROOT_FOLDER_NAME:HD사인_작업증거}
