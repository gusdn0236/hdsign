# 테스트 프로파일 — 외부 MySQL 없이 부팅하기 위한 인메모리 H2.
# 운영용 Flyway 마이그레이션은 MySQL 전용이라 테스트에선 끄고(스키마는 JPA ddl-auto 생성),
# 나머지 설정(jwt.secret, 데모 계정 등)은 메인 application.properties 가 그대로 제공한다.
# 이 파일은 @ActiveProfiles("test") 가 붙은 테스트에서만 메인 설정 위에 덮어쓴다.
spring.datasource.url=jdbc:h2:mem:hdsign_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.flyway.enabled=false
