<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>

    <!-- 배포 시 청크 해시가 바뀌므로 옛 index.html 이 캐시되면 옛 청크 404 발생.
         메타 태그는 HTTP 헤더만큼 강력하진 않지만 브라우저 디스크 캐시 동작에 힌트를 준다. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>

    <title>HD Sign | 간판 전문기업</title>
    <meta name="description" content="HD Sign – 갈바, 스테인리스, 에폭시, 특수 간판 전문 제작업체. 품질과 신뢰로 함께합니다."/>

    <!-- Open Graph -->
    <meta property="og:type"        content="website"/>
    <meta property="og:site_name"   content="HD Sign"/>
    <meta property="og:title"       content="HD Sign | 간판 전문기업"/>
    <meta property="og:description" content="갈바, 스테인리스, 에폭시, 특수 간판 전문 제작업체. 품질과 신뢰로 함께합니다."/>
    <meta property="og:url"         content="https://hdsigncraft.com/"/>
    <meta property="og:image"       content="https://hdsigncraft.com/og-image-v2.png"/>
    <meta property="og:image:width"  content="1200"/>
    <meta property="og:image:height" content="630"/>
    <meta property="og:image:alt"   content="HD Sign 간판 전문기업"/>
    <meta property="og:locale"      content="ko_KR"/>
    <meta name="google-site-verification" content="%VITE_GOOGLE_SITE_VERIFICATION%"/>
    <meta name="naver-site-verification" content="%VITE_NAVER_SITE_VERIFICATION%"/>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>

    <!-- 홈 화면 아이콘 — 사파리 모드로 동작 -->
    <!-- iOS PWA standalone 모드에서 click 이벤트 합성 누락/캐시 스냅샷 문제로 버튼이
         먹통이 되는 케이스가 잦아 standalone 을 비활성화. 홈화면 아이콘 탭 시 일반
         사파리에서 열림 — 동작은 사파리 직접 접속과 동일. 풀스크린 룩은 포기하지만
         안정성/일관성 우선. -->
    <link rel="manifest" href="/manifest.webmanifest"/>
    <meta name="theme-color" content="#18181b"/>
    <meta name="apple-mobile-web-app-capable" content="no"/>
    <meta name="mobile-web-app-capable" content="no"/>
    <meta name="apple-mobile-web-app-title" content="HD지시서"/>

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image"/>
    <meta name="twitter:title"       content="HD Sign | 간판 전문기업"/>
    <meta name="twitter:description" content="갈바, 스테인리스, 에폭시, 특수 간판 전문 제작업체."/>
    <meta name="twitter:image"       content="https://hdsigncraft.com/og-image-v2.png"/>
    <script>
        (function () {
            var gaId = "%VITE_GA_MEASUREMENT_ID%";
            if (!gaId || gaId.indexOf("VITE_GA_MEASUREMENT_ID") !== -1) {
                return;
            }
            var script = document.createElement("script");
            script.async = true;
            script.src = "https://www.googletagmanager.com/gtag/js?id=" + encodeURIComponent(gaId);
            document.head.appendChild(script);

            window.dataLayer = window.dataLayer || [];
            function gtag() { window.dataLayer.push(arguments); }
            window.gtag = gtag;
            gtag("js", new Date());
            gtag("config", gaId);
        })();
    </script>
    <script>
        (function() {
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect !== location.href) {
                history.replaceState(null, null, redirect);
            }
        })();
    </script>
</head>
<body>
<div id="root"></div>
<script src="/src/main.jsx" type="module"></script>
</body>
</html>
